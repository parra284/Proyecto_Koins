version: '3.8'
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus_finanzas
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana_finanzas
    ports:
      - "4000:3000" # Accederás por http://localhost:4000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin